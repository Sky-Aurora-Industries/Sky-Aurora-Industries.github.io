<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sky-Aurora Industries</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #0d1117; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: white; 
        }
        .container { 
            border: 2px solid #238636; 
            padding: 50px; 
            border-radius: 25px; 
            text-align: center; 
            background: #161b22; 
            box-shadow: 0 0 20px rgba(35, 134, 54, 0.3);
        }
        h1 { color: #2ea043; font-size: 35px; margin-bottom: 10px; }
        p { color: #8b949e; font-size: 18px; }
        .status-badge { 
            background: #238636; 
            padding: 5px 15px; 
            border-radius: 20px; 
            font-weight: bold; 
            font-size: 14px;
        }
        .back-btn { 
            margin-top: 30px; 
            display: inline-block; 
            color: #ff7b72; 
            text-decoration: none; 
            border: 1px solid #ff7b72; 
            padding: 10px 20px; 
            border-radius: 10px; 
            transition: 0.3s;
        }
        .back-btn:hover { background: #ff7b72; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <span class="status-badge">AUTHORIZED ACCESS</span>
        <h1>WELCOME, CLIENT</h1>
        <p>Sistem Sky-Aurora Industries telah sinkron.</p>
        <p>Status Server: <span style="color: #2ea043;">ACTIVE</span></p>
        
        <a href="login.html" class="back-btn">Logout dari Sistem</a>
    </div>

</body>
</html>
