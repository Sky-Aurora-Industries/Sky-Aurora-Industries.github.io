<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Login - Sky-Aurora Industries</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #0d1117; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }
        .login-card { background-color: #161b22; padding: 40px; border-radius: 20px; border: 1px solid #30363d; width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #58a6ff; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #30363d; background: #0d1117; color: white; font-size: 16px; box-sizing: border-box; }
        input:focus { outline: none; border-color: #58a6ff; }
        .sign-in-btn { width: 100%; padding: 15px; border: none; border-radius: 10px; background: #238636; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .sign-in-btn:hover { background: #2ea043; transform: translateY(-2px); }
        .footer { margin-top: 25px; font-size: 14px; color: #8b949e; }
        .footer a { color: #58a6ff; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Client Login</h2>
        <form id="loginForm">
            <div class="input-group">
                <input type="email" placeholder="Email" required>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Password" required>
            </div>
            <button type="submit" class="sign-in-btn">Sign In</button>
        </form>
        <div class="footer">
            Belum punya akun? <a href="#">Daftar Sekarang</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            const btn = document.querySelector('.sign-in-btn');
            btn.innerText = "AUTHENTICATING...";
            
            setTimeout(() => {
                // ARAHKAN KE NAMA FILE YANG BARU
                window.location.href = "client-dashboard.html"; 
            }, 800); 
        });
    </script>

</body>
</html>
