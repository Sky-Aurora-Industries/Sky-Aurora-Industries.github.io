            <!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky-Aurora | Mega Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; }
        .sidebar { background: #0f172a; transition: transform 0.3s ease; transform: translateX(-100%); width: 280px; position: fixed; height: 100%; z-index: 50; }
        .sidebar.active { transform: translateX(0); }
        .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; }
        .content-section { display: none; }
        .content-section.active { display: block; }
    </style>
</head>
<body>

    <header class="bg-[#0f172a] p-4 flex items-center justify-between border-b border-slate-800">
        <div class="flex items-center gap-4">
            <i class="fas fa-bars text-2xl text-blue-500 cursor-pointer" id="open-sidebar"></i>
            <h1 class="text-xl font-black italic uppercase text-blue-500">SKY-AURORA</h1>
        </div>
    </header>

    <aside class="sidebar" id="sidebar">
        <div class="p-6">
            <i class="fas fa-times text-white cursor-pointer mb-6" id="close-sidebar"></i>
            <div class="mb-10 p-4 rounded-xl bg-slate-800 border border-slate-700">
                <p class="text-[10px] text-slate-500 font-bold uppercase">HELLO</p>
                <p class="text-lg font-black uppercase text-white">CLIENT</p>
            </div>
            <nav class="space-y-4">
                <a href="#" class="block p-4 rounded-xl bg-blue-600/20 text-blue-400 font-bold" onclick="showSection('home')">HOME</a>
                <a href="#" class="block p-4 rounded-xl hover:bg-slate-800" onclick="showSection('shop')">BELANJA</a>
                <a href="#" class="block p-4 rounded-xl hover:bg-slate-800" onclick="showSection('wallet')">DOMPET</a>
                <a href="#" class="block p-4 rounded-xl hover:bg-slate-800" onclick="showSection('help')">SETTINGS</a>
            </nav>
            <button id="logout" class="mt-10 p-4 text-red-500 font-bold w-full hover:bg-red-500/10 rounded-xl">LOGOUT</button>
        </div>
    </aside>

    <main class="p-8">
        <section id="content-home" class="content-section active">
            <h2 class="text-3xl font-black mb-6 uppercase italic">DASHBOARD</h2>
            <div class="card p-6">Status: <span class="text-green-500">Online & Stabil</span></div>
        </section>

        <section id="content-shop" class="content-section">
            <h2 class="text-3xl font-black mb-6 uppercase italic">BELANJA</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="card p-4 text-center">Elektronik</div>
                <div class="card p-4 text-center">Furniture</div>
            </div>
        </section>

        <section id="content-wallet" class="content-section">
            <h2 class="text-3xl font-black mb-6 uppercase italic">DOMPET</h2>
            <div class="card p-6">Gopay & ShopeePay Tautkan No HP.</div>
        </section>
    </main>

    <script>
        // Logika Sidebar
        const sidebar = document.getElementById('sidebar');
        document.getElementById('open-sidebar').onclick = () => sidebar.classList.add('active');
        document.getElementById('close-sidebar').onclick = () => sidebar.classList.remove('active');
        
        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById('content-' + id).classList.add('active');
            sidebar.classList.remove('active');
        }

        // LOGOUT MANUAL SAJA (Tidak ada pengecekan Firebase)
        document.getElementById('logout').onclick = () => {
            window.location.replace("login.html");
        };
    </script>
</body>
</html>
