<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Sky-Aurora</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] text-white p-10">
    <div class="max-w-xl mx-auto bg-slate-900 p-10 rounded-3xl border border-blue-900">
        <h1 id="user" class="text-3xl font-bold mb-6 text-blue-400">Loading...</h1>
        <div class="bg-black p-8 rounded-2xl mb-6">
            <p class="text-sm text-slate-400">Saldo Dompet Digital</p>
            <p class="text-5xl font-mono mt-2">Rp 0,00</p>
        </div>
        <button id="logout" class="w-full bg-red-900/50 p-4 rounded-xl font-bold">LOGOUT</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        const auth = getAuth(initializeApp({apiKey: "AIzaSyB0d3Lnob3ewk9JgjRhzhqB1hX5WUBtBxE", authDomain: "sky-aurora-industries.firebaseapp.com", projectId: "sky-aurora-industries", storageBucket: "sky-aurora-industries.firebasestorage.app", messagingSenderId: "630007984883", appId: "1:630007984883:web:0f760ad82938522d4f7d86"}));

        onAuthStateChanged(auth, (user) => { if (user) document.getElementById('user').innerText = "Personnel: " + user.email.split('@')[0]; else window.location.href = "login.html"; });
        document.getElementById('logout').onclick = () => signOut(auth).then(() => window.location.href = "login.html");
    </script>
</body>
</html>
