<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Sky-Aurora</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] text-white flex h-screen">

    <div class="flex-1 flex items-center justify-center">
        <h2 id="status" class="text-2xl font-mono animate-pulse">VERIFYING CREDENTIALS...</h2>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const auth = getAuth(initializeApp({apiKey: "AIzaSyB0d3Lnob3ewk9JgjRhzhqB1hX5WUBtBxE", authDomain: "sky-aurora-industries.firebaseapp.com", projectId: "sky-aurora-industries", storageBucket: "sky-aurora-industries.firebasestorage.app", messagingSenderId: "630007984883", appId: "1:630007984883:web:0f760ad82938522d4f7d86"}));

        // GANTI LOGIKA: Jangan langsung redirect. Tunggu Firebase selesai load.
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Jika user ditemukan, baru tampilkan konten dashboard
                window.location.href = "dashboard_content.html"; // ATAU load konten langsung di sini
            } else {
                // Hanya tendang jika memang benar-benar tidak ada session
                window.location.replace("login.html");
            }
        });
    </script>
</body>
</html>
