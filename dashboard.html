<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky-Aurora | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; margin: 0; overflow-x: hidden; }
        .sidebar { background: #0f172a; transition: 0.3s; width: 280px; position: fixed; height: 100%; z-index: 100; left: -280px; border-right: 1px solid #1e293b; }
        .sidebar.active { left: 0; }
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:90; }
        .overlay.active { display:block; }
        .content-section { display: none; padding: 20px; }
        .content-section.active { display: block; }
        .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; padding: 20px; }
    </style>
</head>
<body>
    <script>
        if (localStorage.getItem("akses_juandi") !== "DIIZINKAN") {
            window.location.replace("login.html");
        }
    </script>

    <div class="overlay" id="overlay"></div>

    <header class="bg-[#0f172a] p-4 flex items-center justify-between border-b border-slate-800 sticky top-0 z-40">
        <div class="flex items-center gap-4">
            <i class="fas fa-bars text-2xl text-blue-500 cursor-pointer" id="open-sidebar"></i>
            <h1 class="text-xl font-black italic uppercase text-blue-500">SKY-AURORA</h1>
        </div>
    </header>

    <aside class="sidebar" id="sidebar">
        <div class="p-6">
            <div class="flex justify-between items-center mb-8">
                <span class="text-blue-500 font-bold italic font-mono uppercase">Control Center</span>
                <i class="fas fa-times text-slate-500 cursor-pointer" id="close-sidebar"></i>
            </div>
            
            <div class="mb-8 p-4 rounded-xl bg-slate-800 border border-slate-700 flex items-center gap-3">
                <i class="fas fa-user-circle text-3xl text-blue-400"></i>
                <div><p class="text-[10px] text-slate-500 font-bold">WELCOME</p><p class="font-black text-white italic uppercase">JUANDI</p></div>
            </div>

            <nav class="space-y-2">
                <button class="w-full text-left p-4 rounded-xl hover:bg-slate-800 flex items-center gap-3" onclick="showSection('home')"><i class="fas fa-home w-5"></i> HOME</button>
                <button class="w-full text-left p-4 rounded-xl hover:bg-slate-800 flex items-center gap-3" onclick="showSection('shop')"><i class="fas fa-shopping-cart w-5"></i> BELANJA</button>
                <button class="w-full text-left p-4 rounded-xl hover:bg-slate-800 flex items-center gap-3" onclick="showSection('wallet')"><i class="fas fa-wallet w-5"></i> DOMPET</button>
                <button class="w-full text-left p-4 rounded-xl hover:bg-slate-800 flex items-center gap-3" onclick="showSection('help')"><i class="fas fa-cog w-5"></i> SETTINGS</button>
            </nav>

            <button id="logout-final" class="mt-12 w-full p-4 text-red-500 font-bold flex items-center gap-4 hover:bg-red-500/10 rounded-xl transition">
                <i class="fas fa-power-off"></i> LOGOUT SESSION
            </button>
        </div>
    </aside>

    <main class="p-4">
        <section id="content-home" class="content-section active">
            <h2 class="text-2xl font-black mb-6 italic text-white uppercase tracking-tighter">Prime Deals (>10JT)</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="card flex gap-4 items-center border-l-4 border-l-blue-500">
                    <i class="fas fa-laptop-code text-3xl text-blue-500"></i>
                    <div><h4 class="font-bold">Quantum Laptop X-1</h4><p class="text-blue-400 font-mono">Rp 24.500.000</p></div>
                </div>
            </div>
        </section>

        <section id="content-shop" class="content-section">
            <h2 class="text-2xl font-black mb-6 italic uppercase">Inventory</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="card text-center"><i class="fas fa-chair mb-2"></i><p>Furniture</p></div>
                <div class="card text-center"><i class="fas fa-microchip mb-2"></i><p>Elektronik</p></div>
            </div>
        </section>

        <section id="content-wallet" class="content-section">
            <h2 class="text-2xl font-black mb-6 italic uppercase">Digital Wallet</h2>
            <div class="card border-l-4 border-l-green-500 mb-4">
                <p class="text-xs text-slate-500">GOPAY</p>
                <p class="text-xl font-bold">Rp 0,00</p>
                <button class="mt-4 text-[10px] text-green-500 border border-green-500 px-2 py-1 rounded">Tautkan Nomor</button>
            </div>
        </section>
    </main>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        
        document.getElementById('open-sidebar').onclick = () => { sidebar.classList.add('active'); overlay.classList.add('active'); };
        document.getElementById('close-sidebar').onclick = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); };
        overlay.onclick = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); };

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById('content-' + id).classList.add('active');
            sidebar.classList.remove('active'); overlay.classList.remove('active');
        }

        // SATU-SATUNYA CARA BALIK KE LOGIN
        document.getElementById('logout-final').onclick = () => {
            localStorage.removeItem("akses_juandi");
            window.location.replace("login.html");
        };
    </script>
</body>
</html>
