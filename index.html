<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sky-Aurora | Gate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: black; margin: 0; overflow: hidden; font-family: monospace; }
        canvas { position: absolute; top: 0; left: 0; z-index: -1; opacity: 0.4; }
    </style>
</head>
<body class="flex items-center justify-center h-screen px-6">
    <canvas id="m"></canvas>
    <div class="p-10 max-w-lg text-center border border-[#00ff00] bg-black/90 shadow-[0_0_20px_#00ff00]">
        <h1 class="text-[#00ff00] text-2xl font-black tracking-[0.5em] mb-4 uppercase">Sky-Aurora Industries</h1>
        <a href="login.html" class="inline-block w-full py-4 border border-[#00ff00] text-[#00ff00] font-bold hover:bg-[#00ff00] hover:text-black transition-all duration-500 uppercase tracking-widest text-sm">
            Enter Terminal
        </a>
    </div>
    <script>
        const c=document.getElementById("m"),x=c.getContext("2d");c.width=window.innerWidth;c.height=window.innerHeight;
        const s=16,p=Array(Math.floor(c.width/s)).fill(0);
        function d(){x.fillStyle="rgba(0,0,0,0.05)";x.fillRect(0,0,c.width,c.height);x.fillStyle="#0f0";x.font=s+"px monospace";
        p.forEach((y,i)=>{x.fillText(String.fromCharCode(Math.random()*128),i*s,y);if(y>100+Math.random()*1e4)p[i]=0;else p[i]=y+s;})}
        setInterval(d,33);
    </script>
</body>
</html>
