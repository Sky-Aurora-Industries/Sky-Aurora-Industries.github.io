<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKY-AURORA | SECURE_PORTAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow-x: hidden; }
        #matrix { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.4; }
        .container { padding: 20px; max-width: 800px; margin: auto; position: relative; z-index: 1; }
        .terminal-box { border: 2px solid #0f0; padding: 20px; background: rgba(0, 15, 0, 0.85); box-shadow: 0 0 20px rgba(0, 255, 0, 0.3); margin-top: 50px; }
        .header { border-bottom: 1px solid #0f0; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { font-size: 1.4em; text-shadow: 0 0 10px #0f0; letter-spacing: 2px; }
        .info { margin: 15px 0; font-size: 0.9em; line-height: 1.6; }
        .highlight { color: #fff; text-decoration: underline; }
        .btn-portal { display: inline-block; margin-top: 20px; padding: 10px 20px; border: 1px solid #0f0; color: #0f0; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn-portal:hover { background: #0f0; color: #000; }
    </style>
</head>
<body oncontextmenu="return false;">
    <canvas id="matrix"></canvas>
    <div class="container">
        <div class="terminal-box">
            <div class="header">
                <h1>[ WELCOME TO BASE_HACKER ]</h1>
                <p style="font-size: 0.7em; color: #888;">CORE_SYSTEM_V.2.06 / CEO: CIPHER0X</p>
            </div>
            <div class="info">
                <p>> SYSTEM STATUS: <span style="color: cyan;">ENCRYPTED</span></p>
                <p>> LOCATION: <span style="color: yellow;">UNTRACEABLE</span></p>
                <p>> GREETING: Selamat datang di pusat kendali <span class="highlight">SKY-AURORA</span>. Seluruh aliran data di jaringan ini berada di bawah pengawasan kami.</p>
            </div>
            <a href="login.html" class="btn-portal">ACCESS CLIENT LOGIN</a>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "0101010101010101ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%^&*";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 35);
    </script>
</body>
</html>
