<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sky-Aurora | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: black; color: #00ff00; font-family: monospace; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; z-index: -1; opacity: 0.5; }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <canvas id="matrix"></canvas>
    <div class="border-2 border-[#00ff00] p-10 bg-black/90 text-center shadow-[0_0_20px_#00ff00]">
        <h1 class="text-2xl font-bold mb-4 uppercase">[ WELCOME TO OPERATIONAL PORTAL ]</h1>
        <p class="mb-8 text-xs opacity-70">SKY-AURORA INDUSTRIES // CODENAME: SKY-PORTAL-01</p>
        <a href="login.html" class="px-8 py-4 bg-[#00ff00] text-black font-black uppercase tracking-widest hover:bg-white transition-all">
            Access Client Terminal
        </a>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ff00"; ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);
    </script>
</body>
</html>
