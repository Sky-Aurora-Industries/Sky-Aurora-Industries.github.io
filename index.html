<!DOCTYPE html>
<html lang="id">

    <style>

<body class="h-screen flex flex-col items-center justify-center text-white p-6">

        </button>
              <button onclick="window.location.href='admin-login.html'" class="group relative w-full px-10 py-4 mt-4 border border-blue-500/50 bg-slate-900/50 rounded-full font-black uppercase tracking-widest hover:bg-blue-600 transition-all active:scale-95">

            <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
        </span>
        <marquee scrollamount="3" class="w-full">
