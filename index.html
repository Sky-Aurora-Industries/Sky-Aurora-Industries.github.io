<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky-Aurora | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; }
        .sidebar { background: rgba(15, 23, 42, 0.9); border-right: 1px solid #1e40af; transition: all 0.3s; }
        .nav-item:hover { background: rgba(59, 130, 246, 0.1); color: #60a5fa; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar w-64 flex flex-col p-6 shadow-2xl">
        <div class="mb-10 flex items-center gap-3">
            <i class="fas fa-shield-alt text-2xl text-blue-500"></i>
            <h1 class="text-xl font-black tracking-widest uppercase">Sky-Aurora</h1>
        </div>

        <nav class="flex-1 space-y-2">
            <a href="#" class="nav-item flex items-center gap-4 p-4 rounded-xl text-blue-500 bg-blue-500/10 font-bold">
                <i class="fas fa-home w-5"></i> HOME
            </a>
            <a href="#" class="nav-item flex items-center gap-4 p-4 rounded-xl text-slate-400 font-bold">
                <i class="fas fa-user-circle w-5"></i> AKUN
            </a>
            <a href="#" class="nav-item flex items-center gap-4 p-4 rounded-xl text-slate-400 font-bold">
                <i class="fas fa-wallet w-5"></i> DOMPET DIGITAL
            </a>
        </nav>

        <button id="btn-logout" class="mt-auto flex items-center gap-4 p-4 text-red-500 font-bold hover:bg-red-500/10 rounded-xl">
            <i class="fas fa-power-off"></i> SECURE LOGOUT
        </button>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <div class="max-w-4xl">
            <h2 id="user-display" class="text-3xl font-bold mb-2 uppercase tracking-tighter">Personnel: Loading...</h2>
            <p class="text-slate-500 mb-10 text-sm">Status: <span class="text-green-500 font-bold">Encrypted Connection Active</span></p>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl shadow-lg">
                    <p class="text-xs text-blue-500 font-bold uppercase mb-2">Saldo Dompet Digital</p>
                    <p class="text-4xl font-mono">Rp 0,00</p>
                </div>
                <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl shadow-lg">
                    <p class="text-xs text-blue-500 font-bold uppercase mb-2">Pemberitahuan</p>
                    <p class="text-sm text-slate-400 italic">"Selamat datang di sistem Sky-Aurora. Semua aktivitas Anda dipantau secara aman."</p>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB0d3Lnob3ewk9JgjRhzhqB1hX5WUBtBxE",
            authDomain: "sky-aurora-industries.firebaseapp.com",
            projectId: "sky-aurora-industries",
            storageBucket: "sky-aurora-industries.firebasestorage.app",
            messagingSenderId: "630007984883",
            appId: "1:630007984883:web:0f760ad82938522d4f7d86"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Pantau apakah user sudah login atau belum
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('user-display').innerText = "Personnel: " + user.email.split('@')[0];
            } else {
                // Jika belum login, tendang balik ke login.html
                window.location.href = "login.html";
            }
        });

        // Fungsi Logout
        document.getElementById('btn-logout').onclick = () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            });
        };
    </script>
</body>
</html>
