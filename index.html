<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Aurora Industries</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6)), 
                    url('Logo Perusahaan.png'); /* Gambar Markas */
            background-size: cover; background-position: center;
        }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center text-white p-6">
    <div class="glass p-12 rounded-[50px] text-center shadow-2xl scale-110">
        <h1 class="text-4xl font-black italic uppercase tracking-tighter text-blue-500 mb-2">SKY AURORA</h1>
        <p class="text-xs font-bold tracking-[0.4em] text-slate-300 mb-8 uppercase">Global Omni-Tech Leaders</p>
        
        <h2 class="text-2xl font-bold mb-10 italic">WELCOME<br>CLIENT </h2>
        
        <button onclick="window.location.href='login.html'" class="group relative px-10 py-4 bg-blue-600 rounded-full font-black uppercase tracking-widest hover:bg-blue-500 transition-all">
            ENTER TERMINAL
            <div class="absolute -inset-1 bg-blue-500 rounded-full blur opacity-30 group-hover:opacity-60"></div>
        </button>
    </div>
</body>
</html>
