<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKY AURORA INDUSTRIES | PRIVATE MARKETPLACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Urbanist', sans-serif; background-color: #000; color: #fff; }
        .aurora-border { border: 1px solid #deff9a; }
        .aurora-text { color: #deff9a; }
        .aurora-bg { background-color: #deff9a; }
        .grid-bg { background-image: radial-gradient(#1a1a1a 1px, transparent 1px); background-size: 30px 30px; }
    </style>
</head>
<body class="grid-bg min-h-screen">

    <nav class="p-6 border-b border-zinc-800 flex justify-between items-center backdrop-blur-md sticky top-0 z-50 bg-black/80">
        <div class="text-2xl font-800 tracking-tighter">SKY AURORA <span class="aurora-text">INDUSTRIES</span></div>
        <div class="hidden md:flex gap-8 text-sm uppercase tracking-widest text-zinc-400">
            <a href="#vendor" class="hover:text-[#deff9a] transition-all">Pusat Vendor</a>
            <a href="#katalog" class="hover:text-[#deff9a] transition-all">Katalog Fisik</a>
            <a href="#" class="hover:text-[#deff9a] transition-all">Statistik</a>
        </div>
        <div class="flex gap-4 items-center">
            <button onclick="toggleModal('upload-modal')" class="aurora-border px-4 py-2 text-sm hover:aurora-bg hover:text-black transition-all font-bold">TITIP BARANG</button>
        </div>
    </nav>

    <header class="py-20 px-6 text-center">
        <h1 class="text-6xl font-800 mb-4 uppercase tracking-tighter">Pasar Digital <span class="aurora-text">Tanpa Batas</span></h1>
        <p class="text-zinc-400 max-w-2xl mx-auto">Platform pihak ketiga. Masukkan barang fisik pengusaha, kita buat laku kilat. Fee 10% flat.</p>
    </header>

    <main id="katalog" class="max-w-7xl mx-auto px-6 pb-20">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-semibold uppercase tracking-widest">Available Assets</h2>
            <div class="h-[1px] flex-grow mx-6 bg-zinc-800"></div>
        </div>
        <div id="product-container" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <div id="upload-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-6">
        <div class="bg-zinc-900 aurora-border p-8 w-full max-w-md relative">
            <button onclick="toggleModal('upload-modal')" class="absolute top-4 right-4 text-zinc-500 hover:text-white">✕</button>
            <h3 class="text-2xl font-bold mb-6 aurora-text">UPLOAD ASSET FISIK</h3>
            <form id="upload-form" class="space-y-4">
                <div><label class="text-[10px] uppercase text-zinc-500">Nama Barang</label><input type="text" id="p-name" class="w-full bg-black border border-zinc-800 p-3 mt-1 outline-none focus:border-[#deff9a]"></div>
                <div><label class="text-[10px] uppercase text-zinc-500">Harga (IDR)</label><input type="number" id="p-price" class="w-full bg-black border border-zinc-800 p-3 mt-1 outline-none focus:border-[#deff9a]"></div>
                <div><label class="text-[10px] uppercase text-zinc-500">Deskripsi Singkat</label><textarea id="p-desc" class="w-full bg-black border border-zinc-800 p-3 mt-1 outline-none focus:border-[#deff9a]"></textarea></div>
                <button type="submit" class="w-full aurora-bg text-black font-bold py-4 hover:opacity-80 transition-all">LAUNCH LISTING</button>
            </form>
        </div>
    </div>

    <script>
        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        
        const products = [
            { name: "Motor Custom v1", price: "15.000.000", img: "https://via.placeholder.com/400/1a1a1a/deff9a?text=Motor+Fisik" },
            { name: "Furniture Industrial", price: "3.500.000", img: "https://via.placeholder.com/400/1a1a1a/deff9a?text=Furniture" },
            { name: "Jam Tangan Mekanik", price: "2.100.000", img: "https://via.placeholder.com/400/1a1a1a/deff9a?text=Jam+Tangan" }
        ];

        function render() {
            const container = document.getElementById('product-container');
            container.innerHTML = products.map(p => `
                <div class="border border-zinc-800 p-4 hover:border-[#deff9a] transition-all">
                    <div class="aspect-square bg-zinc-900 mb-4 overflow-hidden"><img src="${p.img}" class="w-full h-full object-cover"></div>
                    <h4 class="font-bold mb-1">${p.name}</h4>
                    <div class="flex justify-between items-center mt-4">
                        <span class="aurora-text font-bold">Rp${p.price}</span>
                        <button class="bg-white text-black text-[10px] px-3 py-1 font-bold">DETAIL</button>
                    </div>
                </div>
            `).join('');
        }
        
        render();

        document.getElementById('upload-form').onsubmit = (e) => {
            e.preventDefault();
            alert('Listing Diterima. Lab Protokol: Data diproses ke antrean...');
            toggleModal('upload-modal');
        };
    </script>
</body>
</html>
