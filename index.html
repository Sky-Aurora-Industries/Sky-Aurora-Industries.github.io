<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKY AURORA INDUSTRIES | PRIVATE MARKETPLACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Urbanist', sans-serif; background-color: #000; color: #fff; }
        .aurora-border { border: 1px solid #deff9a; }
        .aurora-text { color: #deff9a; }
        .aurora-bg { background-color: #deff9a; }
        .grid-bg { background-image: radial-gradient(#1a1a1a 1px, transparent 1px); background-size: 30px 30px; }
    </style>
</head>
<body class="grid-bg min-h-screen">

    <nav class="p-6 border-b border-zinc-800 flex justify-between items-center backdrop-blur-md sticky top-0 z-50 bg-black/80">
        <div class="text-2xl font-800 tracking-tighter cursor-pointer" onclick="location.reload()">SKY AURORA <span class="aurora-text">INDUSTRIES</span></div>
        <div class="flex gap-4 items-center">
            <button onclick="toggleModal('cart-modal')" class="text-zinc-400 hover:text-[#deff9a] transition-all">KERANJANG (<span id="cart-count">0</span>)</button>
            <button onclick="toggleModal('upload-modal')" class="aurora-border px-4 py-2 text-sm hover:aurora-bg hover:text-black transition-all font-bold">TITIP BARANG</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-20">
        <div id="product-container" class="grid grid-cols-1 md:grid-cols-4 gap-8"></div>
    </main>

    <div id="cart-modal" class="fixed inset-0 bg-black/90 hidden z-[100] flex items-center justify-center p-6">
        <div class="bg-zinc-900 aurora-border p-8 w-full max-w-sm">
            <h3 class="text-xl font-bold mb-4">KERANJANG BELANJA</h3>
            <div id="cart-items" class="mb-4"></div>
            <button onclick="toggleModal('cart-modal')" class="w-full aurora-border py-2">TUTUP</button>
        </div>
    </div>

    <div id="upload-modal" class="fixed inset-0 bg-black/90 hidden z-[100] flex items-center justify-center p-6">
        <div class="bg-zinc-900 aurora-border p-8 w-full max-w-md">
            <form id="upload-form" class="space-y-4">
                <input type="text" id="p-name" placeholder="Nama Barang" required class="w-full bg-black border border-zinc-800 p-3 outline-none focus:border-[#deff9a]">
                <input type="number" id="p-price" placeholder="Harga" required class="w-full bg-black border border-zinc-800 p-3 outline-none focus:border-[#deff9a]">
                <button type="submit" class="w-full aurora-bg text-black font-bold py-4">LAUNCH LISTING</button>
            </form>
        </div>
    </div>

    <script>
        let products = JSON.parse(localStorage.getItem('aurora_assets')) || [];
        let cart = JSON.parse(localStorage.getItem('aurora_cart')) || [];
        
        // Filter Kata Sampah/Jahat
        const blacklist = ['bunuh', 'bom', 'narkoba', 'ilegal'];

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

        document.getElementById('upload-form').onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById('p-name').value;
            
            // Logika Moderasi
            if (blacklist.some(word => name.toLowerCase().includes(word))) {
                alert('ERROR: Unsur terlarang terdeteksi. Listing ditolak.');
                return;
            }
            
            products.push({ name, price: document.getElementById('p-price').value });
            localStorage.setItem('aurora_assets', JSON.stringify(products));
            location.reload();
        };

        function addToCart(index) {
            cart.push(products[index]);
            localStorage.setItem('aurora_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-items').innerHTML = cart.map(p => `<p>${p.name} - Rp${p.price}</p>`).join('');
        }

        function render() {
            document.getElementById('product-container').innerHTML = products.map((p, i) => `
                <div class="border border-zinc-800 p-4">
                    <h4 class="font-bold">${p.name}</h4>
                    <p class="aurora-text">Rp${parseInt(p.price).toLocaleString()}</p>
                    <button onclick="addToCart(${i})" class="mt-4 w-full aurora-border py-2 text-xs">ADD TO CART</button>
                </div>
            `).join('');
        }

        render();
        updateCartUI();
    </script>
</body>
</html>
