<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky-Aurora Industries | Global Prime Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-900 antialiased">
    <nav class="flex justify-between items-center px-10 py-6 border-b border-gray-100">
        <div class="text-2xl font-black tracking-tighter text-blue-600">SKY-AURORA</div>
        <div class="hidden md:flex space-x-10 text-sm font-medium uppercase tracking-widest">
            <a href="#" class="hover:text-blue-500">Solutions</a>
            <a href="#catalog" class="hover:text-blue-500">Store</a>
            <a href="https://wa.me/yournumber" class="hover:text-blue-500">Contact</a>
        </div>
        <button id="loginBtnNav" class="bg-blue-600 text-white px-6 py-2 rounded-full text-sm font-bold shadow-lg shadow-blue-200 hover:bg-blue-700">LOGIN</button>
    </nav>

    <section class="px-10 py-20 lg:py-32 bg-slate-50">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-6xl md:text-7xl font-extrabold leading-tight mb-8">Next-Gen Technology for <span class="text-blue-600">Global Enterprises.</span></h1>
            <p class="text-xl text-gray-500 mb-10">Providing premium digital assets and infrastructure from Dubai to the world.</p>
            <div class="flex justify-center space-x-4">
                <a href="#catalog" class="bg-black text-white px-10 py-4 rounded-lg font-bold">Browse Catalog</a>
                <button id="learnMoreBtn" class="border border-gray-300 px-10 py-4 rounded-lg font-bold">Learn More</button>
            </div>
        </div>
    </section>

    <section id="catalog" class="px-10 py-20">
        <h2 class="text-3xl font-bold mb-12 text-center">Featured Solutions</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-10 max-w-7xl mx-auto">
            <div class="group cursor-pointer bg-white p-6 rounded-3xl border border-gray-100 shadow-sm hover:shadow-xl transition">
                <div class="h-64 bg-gray-200 rounded-2xl mb-6 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=800&q=80" class="w-full h-full object-cover">
                </div>
                <h3 class="text-xl font-bold">Aurora-Secure Cloud</h3>
                <p class="text-gray-500 text-sm mt-2">Enterprise-grade cloud protection for high-stakes data.</p>
                <div class="flex justify-between items-center mt-6">
                    <span class="text-blue-600 font-bold text-xl">$2,499.00</span>
                    <button onclick="addToCart('Aurora-Secure Cloud')" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-blue-700 transition">ADD TO CART</button>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
