<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURORA LITE | ADMIN AUTH</title>
    <style>
        :root {
            --bg-color: #0d1117; /* Darker, premium blue-black */
            --card-bg: #161b22;
            --primary-accent: #238636; /* Premium admin green, not matrix green */
            --primary-hover: #2ea043;
            --input-bg-focus: #1f242b;
            --text-color: #c9d1d9;
            --text-muted: #8b949e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background-color: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 6px;
            width: 100%;
            max-width: 380px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .admin-header {
            margin-bottom: 30px;
            position: relative;
        }

        /* Icon Gembok Minimalis di Atas */
        .lock-icon {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 48px;
            height: 48px;
            border: 2px solid #30363d;
            border-radius: 50%;
            margin-bottom: 15px;
            color: var(--text-muted);
        }

        .admin-header h2 {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
            letter-spacing: 2px;
            color: #fff;
            text-transform: uppercase;
        }

        .admin-header p {
            font-size: 13px;
            color: var(--text-muted);
            margin: 5px 0 0;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            background-color: var(--input-bg-focus);
            border-color: var(--primary-accent);
            box-shadow: 0 0 0 3px rgba(35, 134, 54, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-accent);
            border: 1px solid rgba(240,246,252,0.1);
            color: #fff;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .status-footer {
            margin-top: 25px;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .status-online {
            color: #2ea043;
            font-weight: bold;
        }

        /* SVG Lock Icon */
        .lock-svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="admin-header">
        <div class="lock-icon">
            <svg class="lock-svg" viewBox="0 0 24 24"><path d="M12,17A2,2,0,0,0,14,15A2,2,0,0,0,12,13A2,2,0,0,0,10,15A2,2,0,0,0,12,17M18,8H17V6A5,5,0,0,0,7,6V8H6A2,2,0,0,0,4,10V20A2,2,0,0,0,6,22H18A2,2,0,0,0,20,20V10A2,2,0,0,0,18,8M9,6A3,3,0,0,1,15,6V8H9Z"></path></svg>
        </div>
        <h2>ADMIN ROOT</h2>
        <p>SECURE NODE ACCESS ONLY</p>
    </div>

    <div class="input-group">
        <input type="text" id="username" placeholder="Identifier" autocomplete="off">
    </div>

    <div class="input-group">
        <input type="password" id="password" placeholder="Key">
    </div>

    <button onclick="login()">EXECUTE</button>
    
    <div class="status-footer">
        AURORA LITE V3.0 | SYSTEM Status: <span class="status-online">SECURED</span>
    </div>
</div>

<script>
    function login() {
        const user = document.getElementById('Admin ID').value;
        const pass = document.getElementById('password').value;

        // Login lo, Sky.
        if(user === "Christ" && pass === "Talaud2026") {
            alert("ACCESS GRANTED. Welcome back, King.");
            window.location.href = "admin-dashboard.html"; 
        } else {
            alert("[ERROR: EXTERNAL_INTERFERENCE_DETECTED_AND_DELETED]");
            // Reset input
            document.getElementById('username').value = "";
            document.getElementById('password').value = "";
        }
    }

    // Enter to login
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            login();
        }
    });
</script>

</body>
</html>
