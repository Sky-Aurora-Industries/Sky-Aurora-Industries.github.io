<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Aurora | Client Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('1000099005.png'); background-size: cover;" class="h-screen flex items-center justify-center p-6 text-white font-sans">

    <div class="bg-slate-900/80 backdrop-blur-lg p-8 rounded-[40px] border border-blue-500/30 w-full max-w-sm text-center shadow-2xl">
        <h2 id="auth-title" class="text-2xl font-black italic text-blue-500 mb-2 uppercase tracking-tighter">CLIENT LOGIN</h2>
        <p id="auth-desc" class="text-[10px] text-slate-400 mb-8 tracking-widest uppercase">Access Your Omni-Tech Dashboard</p>

        <input type="email" id="email" placeholder="GMAIL / EMAIL" class="w-full p-4 mb-4 bg-black/50 rounded-2xl border border-slate-700 outline-none focus:border-blue-500 text-sm transition-all">
        <input type="password" id="password" placeholder="PASSWORD" class="w-full p-4 mb-6 bg-black/50 rounded-2xl border border-slate-700 outline-none focus:border-blue-500 text-sm transition-all">

        <button id="main-btn" class="w-full bg-blue-600 p-4 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-500 transition-all active:scale-95 shadow-lg shadow-blue-500/20">
            SIGN IN
        </button>

        <p class="mt-6 text-[11px] text-slate-500">
            <span id="toggle-text">Don't have an account?</span> 
            <button onclick="toggleAuth()" id="toggle-link" class="text-blue-400 font-bold hover:underline ml-1">Register Now</button>
        </p>
        
        <p id="message" class="mt-4 text-[10px] text-red-500 font-mono"></p>
    </div>

    <script type="module">
        // TEMPELKAN KUNCI API FIREBASE KAMU DI SINI
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB0d3Lnob3ewk9JgjRhzhqB1hX5WUbtBxE",
            authDomain: "sky-aurora-industries.firebaseapp.com",
            projectId: "sky-aurora-industries",
            storageBucket: "sky-aurora-industries.firebasestorage.app",
            messagingSenderId: "630007984883",
            appId: "1:630007984883:web:0f760ad02938522d4f7d86"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let isLoginMode = true;

        // Fungsi Ganti Mode Login/Daftar
        window.toggleAuth = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "CLIENT LOGIN" : "CLIENT REGISTER";
            document.getElementById('main-btn').innerText = isLoginMode ? "SIGN IN" : "CREATE ACCOUNT";
            document.getElementById('toggle-text').innerText = isLoginMode ? "Don't have an account?" : "Already have an account?";
            document.getElementById('toggle-link').innerText = isLoginMode ? "Register Now" : "Login Here";
        };

        // Eksekusi Tombol Utama
        document.getElementById('main-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                    alert("Welcome back, Client!");
                    window.location.href = "client-dashboard.html";
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                    alert("Account Created Successfully! Please Login.");
                    toggleAuth();
                }
            } catch (error) {
                msg.innerText = "ERROR: " + error.message;
            }
        };
    </script>
</body>
</html>
