<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Login | Sky Aurora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), url('1000099005.png'); background-size: cover; background-position: center; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6 text-white">
    <div class="glass p-10 rounded-[40px] w-full max-w-sm text-center">
        <h2 class="text-xl font-black italic text-blue-500 mb-6 uppercase tracking-widest">CLIENT ACCESS</h2>
        <input type="email" placeholder="CLIENT EMAIL" class="w-full p-4 mb-4 bg-slate-900/50 rounded-2xl border border-slate-700 outline-none focus:border-blue-500">
        <input type="password" placeholder="PASSWORD" class="w-full p-4 mb-6 bg-slate-900/50 rounded-2xl border border-slate-700 outline-none focus:border-blue-500">
        <button class="w-full bg-blue-600 p-4 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-500 transition shadow-lg">LOGIN CLIENT</button>
        <p class="mt-4 text-[10px] text-slate-400">Need account? Contact Director Christ</p>
    </div>
</body>
</html>
