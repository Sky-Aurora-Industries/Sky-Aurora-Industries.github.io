<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sky-Aurora Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center h-screen">
    <div class="bg-white p-10 rounded-3xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-10">
            <h1 class="text-2xl font-black text-blue-600 tracking-tighter">SKY-AURORA</h1>
            <p class="text-gray-400 text-sm mt-2">Welcome back, please login to your account.</p>
        </div>
        
        <form class="space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Email Address</label>
                <input type="email" class="w-full border-b-2 border-gray-100 focus:border-blue-600 outline-none py-2 transition-all" placeholder="name@company.com">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Password</label>
                <input type="password" class="w-full border-b-2 border-gray-100 focus:border-blue-600 outline-none py-2 transition-all" placeholder="••••••••">
            </div>
            <button type="button" onclick="alert('System secure: Access restricted.')" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">SIGN IN</button>
        </form>
        
        <p class="text-center text-gray-400 text-xs mt-8">
            Don't have an account? <a href="signup.html" class="text-blue-600 font-bold">Request Access</a>
        </p>
    </div>
</body>
</html>
