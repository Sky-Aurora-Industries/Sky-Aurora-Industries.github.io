<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sky-Aurora | Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] flex items-center justify-center h-screen text-white">
    <div class="bg-[#0f172a] p-10 rounded-[40px] w-full max-w-sm border border-slate-800 shadow-2xl">
        <h2 class="text-center text-2xl font-black text-blue-500 tracking-tighter uppercase mb-8">Client Portal</h2>
        <input type="email" id="e" class="w-full p-4 mb-4 bg-slate-900 rounded-2xl border border-slate-800 text-sm outline-none focus:border-blue-500" placeholder="Email">
        <input type="password" id="p" class="w-full p-4 mb-6 bg-slate-900 rounded-2xl border border-slate-800 text-sm outline-none focus:border-blue-500" placeholder="Password">
        <button id="l" class="w-full bg-blue-600 p-4 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-500 mb-3">Login</button>
        <button id="r" class="w-full border border-slate-700 p-4 rounded-2xl font-bold text-slate-400 hover:bg-slate-800">Register</button>
        <p id="m" class="mt-6 text-[10px] text-center font-mono uppercase tracking-widest"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyB0d3Lnob3ewk9JgjRhzhqB1hX5WUbtBxE",
            authDomain: "sky-aurora-industries.firebaseapp.com",
            projectId: "sky-aurora-industries",
            storageBucket: "sky-aurora-industries.firebasestorage.app",
            messagingSenderId: "630007984883",
            appId: "1:630007984883:web:0f760ad82938522d4f7d86"
        };

        const auth = getAuth(initializeApp(firebaseConfig));
        const msg = document.getElementById('m');

        document.getElementById('r').onclick = async () => {
            try { 
                await createUserWithEmailAndPassword(auth, document.getElementById('e').value, document.getElementById('p').value); 
                msg.innerText="Akun Berhasil Dibuat!"; msg.style.color="#4ade80"; 
            } catch(e){ msg.innerText=e.message; msg.style.color="#f87171"; }
        };

        document.getElementById('l').onclick = async () => {
            try { 
                await signInWithEmailAndPassword(auth, document.getElementById('e').value, document.getElementById('p').value); 
                // Redirect ke dashboard setelah login sukses
                window.location.replace("dashboard.html"); 
            } catch(e){ msg.innerText=e.message; msg.style.color="#f87171"; }
        };
    </script>
</body>
</html>
