<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKY-AURORA | CLIENT_AUTH</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000 url('hacker-bg.png') no-repeat center center fixed; 
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        body::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 1; }

        .login-card { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; border-radius: 15px; width: 100%; max-width: 400px;
            position: relative; z-index: 2; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
        }
        h2 { color: #4b0082; margin-bottom: 10px; font-style: italic; }
        .input-group { margin: 15px 0; text-align: left; }
        input, select { 
            width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; 
            border-radius: 5px; outline: none; 
        }
        .btn-login { 
            width: 100%; padding: 12px; background: #4b0082; color: white; 
            border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px;
        }
        .btn-google {
            width: 100%; padding: 10px; background: #fff; color: #555; 
            border: 1px solid #ddd; border-radius: 5px; cursor: pointer; 
            margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .footer-link { margin-top: 20px; font-size: 0.85em; color: #666; }
        .footer-link a { color: #4b0082; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Sky Aurora Industries</h2>
        <p style="font-size: 0.9em; color: #555; margin-bottom: 20px;">Client Operational Access</p>
        
        <form id="loginForm">
            <div class="input-group">
                <input type="text" placeholder="Username / Email" required>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-login">Log In</button>
        </form>

        <button class="btn-google" onclick="alert('Google Auth Sedang Diintegrasikan...')">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20" alt="G">
            Sign in with Google
        </button>

        <div class="footer-link">
            Belum punya akses? <a href="signup.html">Sign Up di sini</a>
        </div>
    </div>
</body>
</html>
