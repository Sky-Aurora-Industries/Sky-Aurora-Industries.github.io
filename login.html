<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sky-Aurora | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 flex justify-center items-center h-screen text-white">
    <div class="bg-slate-900 p-8 rounded-2xl w-full max-w-sm border border-blue-900">
        <h1 class="text-center font-bold text-xl mb-6 uppercase tracking-widest">Sky-Aurora Login</h1>
        <input type="email" id="email" class="w-full p-3 mb-4 bg-slate-800 rounded border border-slate-700" placeholder="Email">
        <input type="password" id="password" class="w-full p-3 mb-4 bg-slate-800 rounded border border-slate-700" placeholder="Password">
        <button id="login" class="w-full bg-blue-600 p-3 rounded font-bold mb-2">LOGIN</button>
        <button id="register" class="w-full bg-slate-800 p-3 rounded font-bold">REGISTER</button>
        <p id="error" class="mt-4 text-xs text-red-500 text-center"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Kunci yang sudah diperbaiki (Perhatikan huruf B besar)
        const firebaseConfig = {
            apiKey: "AIzaSyB0d3Lnob3ewk9JgjRhzhqB1hX5WUbtBxE",
            authDomain: "sky-aurora-industries.firebaseapp.com",
            projectId: "sky-aurora-industries",
            storageBucket: "sky-aurora-industries.firebasestorage.app",
            messagingSenderId: "630007984883",
            appId: "1:630007984883:web:0f760ad82938522d4f7d86"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const errorTag = document.getElementById('error');

        document.getElementById('register').onclick = async () => {
            try {
                await createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
                errorTag.innerText = "Akun berhasil dibuat!"; errorTag.style.color = "green";
            } catch (e) { errorTag.innerText = e.message; }
        };

        document.getElementById('login').onclick = async () => {
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
                window.location.href = "index.html";
            } catch (e) { errorTag.innerText = e.message; }
        };
    </script>
</body>
</html>
