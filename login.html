<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login | Sky-Aurora</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] flex justify-center items-center h-screen text-white p-6">
    <div class="bg-[#0f172a] p-8 rounded-3xl w-full max-w-sm border border-blue-900 shadow-2xl">
        <h1 class="text-center font-black text-xl mb-6 uppercase text-blue-500">Login Client</h1>
        <input type="email" id="email" class="w-full p-4 mb-4 bg-slate-900 rounded-xl border border-slate-800" placeholder="Email">
        <input type="password" id="password" class="w-full p-4 mb-4 bg-slate-900 rounded-xl border border-slate-800" placeholder="Password">
        <button id="login" class="w-full bg-blue-600 p-4 rounded-xl font-bold mb-3 hover:bg-blue-500">LOGIN</button>
        <button id="register" class="w-full border border-blue-600 p-4 rounded-xl font-bold text-blue-400">REGISTER</button>
        <p id="error" class="mt-4 text-[10px] text-center font-mono"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB0d3Lnob3ewk9JgjRhzhqB1hX5WUbtBxE",
            authDomain: "sky-aurora-industries.firebaseapp.com",
            projectId: "sky-aurora-industries",
            storageBucket: "sky-aurora-industries.firebasestorage.app",
            messagingSenderId: "630007984883",
            appId: "1:630007984883:web:0f760ad82938522d4f7d86"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('register').onclick = async () => {
            try { await createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
            document.getElementById('error').innerText = "Berhasil! Silakan Login."; } catch (e) { document.getElementById('error').innerText = e.message; }
        };

        document.getElementById('login').onclick = async () => {
            try { await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
            window.location.href = "dashboard.html"; } catch (e) { document.getElementById('error').innerText = e.message; }
        };
    </script>
</body>
</html>
