<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PENDAFTARAN PENJUAL | SKY AURORA INDUSTRIES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Urbanist', sans-serif; }
        .aurora-border { border: 1px solid #deff9a; }
        .aurora-text { color: #deff9a; }
        .aurora-bg { background-color: #deff9a; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto aurora-border p-8 bg-zinc-900">
        <h1 class="text-xl font-bold mb-6 aurora-text">PENDAFTARAN PENJUAL</h1>
        <form id="reg-form" class="space-y-4">
            <input type="text" id="toko" placeholder="Nama Toko" required class="w-full bg-black border border-zinc-800 p-3 text-white outline-none">
            <input type="text" id="daerah" placeholder="Asal Daerah (Kota/Kab)" required class="w-full bg-black border border-zinc-800 p-3 text-white outline-none">
            <input type="text" id="desa" placeholder="Asal Desa/Kecamatan" required class="w-full bg-black border border-zinc-800 p-3 text-white outline-none">
            <input type="text" id="barang" placeholder="Nama Produk Utama" required class="w-full bg-black border border-zinc-800 p-3 text-white outline-none">
            <textarea id="deskripsi" placeholder="Deskripsi Singkat Produk" required class="w-full bg-black border border-zinc-800 p-3 text-white outline-none h-24"></textarea>
            
            <button type="button" onclick="kirimPendaftaran()" class="w-full aurora-bg text-black font-bold py-4 hover:opacity-90 transition-all">KIRIM PENDAFTARAN</button>
            <a href="index.html" class="block text-center w-full aurora-border py-4 text-sm font-bold text-white hover:bg-zinc-800 transition-all">Kembali Ke Pasar</a>
        </form>
    </div>

    <script>
        function kirimPendaftaran() {
            const toko = document.getElementById('toko').value;
            const daerah = document.getElementById('daerah').value;
            const desa = document.getElementById('desa').value;
            const barang = document.getElementById('barang').value;
            const deskripsi = document.getElementById('deskripsi').value;

            if(!toko || !daerah || !desa || !barang) { alert('Lengkapi semua data, Bos!'); return; }

            const subject = "PENDAFTARAN PENJUAL BARU - " + toko;
            const body = `Data Penjual Baru:\n\nNama Toko: ${toko}\nAsal Daerah: ${daerah}\nDesa/Kec: ${desa}\nProduk: ${barang}\nDeskripsi: ${deskripsi}`;
            
            window.location.href = `mailto:auroragroup.center@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        }
    </script>
</body>
</html>
