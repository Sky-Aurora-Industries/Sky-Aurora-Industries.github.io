<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKY-AURORA | REGISTRATION</title>
    <style>
        /* CSS-nya sama kayak login.html biar serasi */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000 url('hacker-bg.png') no-repeat center center fixed; background-size: cover; display: flex; justify-content: center; align-items: center; height: 100vh; }
        body::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 1; }
        .card { background: #fff; padding: 40px; border-radius: 15px; width: 100%; max-width: 400px; position: relative; z-index: 2; text-align: center; }
        h2 { color: #4b0082; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .btn-reg { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Create Client Account</h2>
        <form action="login.html" onsubmit="alert('Data pendaftaran terkirim ke database Sky-Aurora!')">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Gmail Address" required>
            <input type="text" placeholder="Create Username" required>
            <input type="password" placeholder="Create Password" required>
            <button type="submit" class="btn-reg">Register Now</button>
        </form>
        <p style="margin-top: 20px; font-size: 0.8em;">Sudah punya akun? <a href="login.html">Login</a></p>
    </div>
</body>
</html>
