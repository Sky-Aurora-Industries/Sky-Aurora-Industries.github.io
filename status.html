<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STATUS ORDER | SKY AURORA INDUSTRIES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Urbanist', sans-serif; }
        .aurora-border { border: 1px solid #deff9a; }
        .aurora-text { color: #deff9a; }
        .aurora-bg { background-color: #deff9a; }
    </style>
</head>
<body class="p-10">
    <div class="max-w-xl mx-auto aurora-border p-8 bg-zinc-900">
        <h1 class="text-2xl font-bold mb-6">STATUS PESANAN</h1>
        
        <div class="space-y-4">
            <div class="p-4 border border-zinc-700">
                <p class="text-zinc-400 text-xs">STATUS TERKINI:</p>
                <p class="text-xl font-bold text-[#deff9a]">DIPROSES OLEH PENJUAL</p>
            </div>
            <p class="text-sm text-zinc-300">
                Pesanan Anda lagi diProses di Tempat Penjualan. Kalau ada kendala, langsung kontak admin lewat menu **BANTUAN (WA)** di halaman utama ya, Tuan!
            </p>
        </div>

        <button onclick="window.history.back()" class="w-full mt-8 border border-zinc-700 py-3 hover:bg-zinc-800 transition-all">KEMBALI KE PASAR</button>
    </div>
</body>
</html>
